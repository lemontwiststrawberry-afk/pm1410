<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김미래 포트폴리오 - Home</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --point-color: #808000; /* 올리브색 */
            --sub-point: #bababa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--point-color);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 3rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--sub-point);
            transition: 0.3s;
        }

        .nav-links a.active {
            color: var(--point-color);
            border-bottom: 2px solid var(--point-color);
        }

        main {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10%;
            gap: 50px;
        }

        .profile-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            animation: fadeIn 1.5s forwards 0.5s;
        }

        /* 이미지 스타일 설정 */
        .profile-img {
            width: 400px;
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            /* 이미지가 안 나올 경우를 대비한 배경색 */
            background-color: #222; 
        }

        .content-text {
            flex: 1.5;
        }

        .typing-container {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .typing-text {
            border-right: 3px solid var(--point-color);
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: typing 3.5s steps(30) forwards, blink 0.8s infinite;
        }

        .highlight { color: var(--point-color); }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink { 50% { border-color: transparent; } }
        @keyframes fadeIn { to { opacity: 1; } }

        @media (max-width: 968px) {
            main { flex-direction: column-reverse; text-align: center; }
            .typing-text { white-space: normal; border-right: none; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <div class="logo">MIRAÉ.</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="works.html">Works</a></li>
        </ul>
    </nav>

    <main>
        <div class="profile-container">
            <img src="kim-mirae.png" alt="김미래 사진" class="profile-img">
        </div>

        <div class="content-text">
            <div class="typing-container">
                <span class="typing-text">
                    데이터로 읽고, AI로 실행하는<br>
                    <span class="highlight">하이브리드 인재, 김미래</span>입니다.
                </span>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];

                particles.push({

                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: Math.random() * 0.5 - 0.
