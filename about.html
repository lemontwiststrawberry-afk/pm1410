<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김미래 포트폴리오 - About</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #e0e0e0;
            --point-color: #808000; /* 올리브 포인트 */
            --sub-point: #bababa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            line-height: 1.6;
        }

        /* 1. 네비게이션: Works 메뉴 안 잘리게 여백 조정 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 10%; /* 좌우 여백을 더 넓게 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(15, 15, 15, 0.98);
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .logo { font-weight: bold; color: var(--point-color); font-size: 1.5rem; }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--sub-point);
            font-weight: 500;
            white-space: nowrap; /* 글자 잘림 방지 */
        }

        .nav-links a.active {
            color: var(--point-color);
            border-bottom: 2px solid var(--point-color);
        }

        /* 컨텐츠 영역 */
        .container {
            max-width: 800px;
            margin: 150px auto 100px;
            padding: 0 20px;
        }

        h2 { font-size: 2rem; color: var(--point-color); margin-bottom: 40px; }

        /* 2. 스킬바: CSS 애니메이션으로 자동 충전 */
        .skill-item { margin-bottom: 35px; }
        .skill-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        
        .bar-bg { background: #333; height: 14px; border-radius: 7px; overflow: hidden; }
        
        .bar-fill { 
            background: var(--point-color); 
            height: 100%; 
            width: 0; /* 시작은 0 */
            border-radius: 7px;
            animation: fillBar 2s ease-out forwards; /* 2초 동안 차오름 */
        }

        /* 애니메이션 설정: 텍스트 파일 데이터 반영 */
        #bar1 { animation-delay: 0.2s; --target-width: 95%; }
        #bar2 { animation-delay: 0.4s; --target-width: 90%; }
        #bar3 { animation-delay: 0.6s; --target-width: 80%; }

        @keyframes fillBar {
            to { width: var(--target-width); }
        }

        /* 경력 로드맵 */
        .timeline { border-left: 2px solid var(--point-color); padding-left: 30px; margin-top: 60px; }
        .timeline-item { position: relative; margin-bottom: 40px; }
        .timeline-item::before {
            content: ''; position: absolute; left: -37px; top: 6px;
            width: 12px; height: 12px; background: var(--point-color); border-radius: 50%;
        }
        .year { color: var(--point-color); font-weight: bold; display: block; margin-bottom: 5px; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">MIRAÉ.</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html" class="active">About</a></li>
            <li><a href="works.html">Works</a></li>
        </ul>
    </nav>

    <div class="container">
        <section>
            <h2>Skills</h2>
            <div class="skill-item">
                <div class="skill-info"><span>AI 활용 능력 (Gemini/ChatGPT/Copilot)</span><span>95%</span></div>
                <div class="bar-bg"><div class="bar-fill" id="bar1"></div></div>
            </div>
            <div class="skill-item">
                <div class="skill-info"><span>Office 자동화 (엑셀/PPT)</span><span>90%</span></div>
                <div class="bar-bg"><div class="bar-fill" id="bar2"></div></div>
            </div>
            <div class="skill-item">
                <div class="skill-info"><span>데이터 분석 (Python/Tableau)</span><span>80%</span></div>
                <div class="bar-bg"><div class="bar-fill" id="bar3"></div></div>
            </div>
        </section>

        <section style="margin-top: 100px;">
            <h2>Career Roadmap</h2>
            <div class="timeline">
                <div class="timeline-item">
                    <span class="year">2025.03 ~ 2026.02</span>
                    <strong>OO 기업 AI 도입 인턴</strong> 
                    <p style="color:var(--sub-point);">워크플로우 자동화 기여 </p>
                </div>
                <div class="timeline-item">
                    <span class="year">2024.08</span>
                    <strong>제1회 AX(AI 전환) 공모전 최우수상 수상</strong> 
                    <p style="color:var(--sub-point);">생성형 AI 활용 마케팅 전략 제안</p>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
